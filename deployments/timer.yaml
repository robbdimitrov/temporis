apiVersion: apps/v1
kind: Deployment
metadata:
  name: timer-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: timer-service
  template:
    metadata:
      labels:
        app: timer-service
    spec:
      containers:
      - name: timer-service
        image: timer-service:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7946
          name: gossip
        env:
        - name: SERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POSTGRES_URL
          valueFrom:
            configMapKeyRef:
              name: timer-config
              key: postgres-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: timer-config
              key: redis-url
        - name: SEED_NODE
          value: timer-service.timers.svc.cluster.local:7946
---
apiVersion: v1
kind: Service
metadata:
  name: timer-service
spec:
  selector:
    app: timer-service
  ports:
  - name: gossip
    port: 7946
    targetPort: 7946
  clusterIP: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timer-config
data:
  postgres-url: "postgres://postgres:password@postgres:5432/timers?sslmode=disable"
  redis-url: "redis://redis:6379"
