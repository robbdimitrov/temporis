apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporis
  template:
    metadata:
      labels:
        app: temporis
    spec:
      containers:
      - name: temporis
        image: temporis:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7946
          name: gossip
        env:
        - name: SERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: timer-secret
              key: postgres-url
        - name: VALKEY_URL
          valueFrom:
            secretKeyRef:
              name: timer-secret
              key: valkey-url
        - name: SEED_NODE
          value: temporis.timers.svc.cluster.local:7946
---
apiVersion: v1
kind: Service
metadata:
  name: temporis
spec:
  selector:
    app: temporis
  ports:
  - name: gossip
    port: 7946
    targetPort: 7946
  clusterIP: None
---
apiVersion: v1
kind: Secret
metadata:
  name: timer-secret
type: Opaque
stringData:
  postgres-url: "postgres://postgres:securepassword123@postgres:5432/timers?sslmode=disable"
  valkey-url: "redis://:securevalkey123@valkey:6379"
