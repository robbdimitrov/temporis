apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporis-policy
spec:
  podSelector:
    matchLabels:
      app: temporis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow temporis pods to communicate with each other on gossip port 7946
    - from:
        - podSelector:
            matchLabels:
              app: temporis
      ports:
        - protocol: TCP
          port: 7946
        - protocol: UDP
          port: 7946
  egress:
    # Allow temporis pods to gossip with each other
    - to:
        - podSelector:
            matchLabels:
              app: temporis
      ports:
        - protocol: TCP
          port: 7946
        - protocol: UDP
          port: 7946
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to database and cache
    - to:
        - podSelector:
            matchLabels:
              app: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: cache
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: datastore-policy
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [database, cache] }
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress to database only from temporis
    - from:
        - podSelector:
            matchLabels:
              app: temporis
      ports:
        - protocol: TCP
          port: 5432
    # Allow ingress to cache only from temporis
    - from:
        - podSelector:
            matchLabels:
              app: temporis
      ports:
        - protocol: TCP
          port: 6379
