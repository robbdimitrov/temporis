apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporis
  template:
    metadata:
      labels:
        app: temporis
    spec:
      containers:
        - name: temporis
          image: temporis:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7946
              name: gossip
            - containerPort: 8080
              name: http-probes
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: timer-secret
                  key: database-url
            - name: CACHE_URL
              valueFrom:
                secretKeyRef:
                  name: timer-secret
                  key: cache-url
            - name: SEED_NODE
              value: temporis.temporis.svc.cluster.local:7946
---
apiVersion: v1
kind: Service
metadata:
  name: temporis
spec:
  selector:
    app: temporis
  ports:
    - name: gossip
      port: 7946
      targetPort: 7946
  clusterIP: None
---
apiVersion: v1
kind: Secret
metadata:
  name: timer-secret
type: Opaque
stringData:
  database-url: "postgres://postgres:securepassword123@database:5432/temporis?sslmode=disable"
  cache-url: "redis://:securevalkey123@cache:6379"
