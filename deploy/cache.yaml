apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
spec:
  serviceName: cache
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: cache
          image: valkey/valkey:8.0-alpine
          command: ["sh", "-c", "exec valkey-server --requirepass \"$CACHE_PASSWORD\""]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          env:
            - name: CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timer-secret
                  key: cache-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cache
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: cache
